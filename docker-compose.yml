services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: weather-station-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-weather}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-weather123}
      POSTGRES_DB: ${POSTGRES_DB:-weather}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-weather} -d ${POSTGRES_DB:-weather}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - weather-network

  # Database Migration Runner
  migrate:
    build:
      context: ./server
      dockerfile: Dockerfile.migrate
    container_name: weather-station-migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-weather}:${POSTGRES_PASSWORD:-weather123}@postgres:5432/${POSTGRES_DB:-weather}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - weather-network
    restart: "no"

  # Weather Station Application
  app:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: weather-station-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-weather}:${POSTGRES_PASSWORD:-weather123}@postgres:5432/${POSTGRES_DB:-weather}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - weather-network
    volumes:
      # Optional: Mount for hot-reload in development
      # - ./server/src:/app/src
      - app_logs:/app/logs

volumes:
  postgres_data:
    driver: local
  app_logs:
    driver: local

networks:
  weather-network:
    driver: bridge