---
name: Release Pipeline
run-name: Release ${{ github.ref }}

permissions:
  contents: write
  packages: write

on:
  push:
    branches:
      - master

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        shell: bash
        run: |
          msg="${{ github.event.head_commit.message }}"
          # Determine version: support manual override or bump from latest tag
          if [[ "$msg" =~ \#version@v([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            semver="${BASH_REMATCH[1]}"
          else
            latest=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            latest="${latest#v}"

            if [[ "$latest" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              major="${BASH_REMATCH[1]}"
              minor="${BASH_REMATCH[2]}"
              patch="${BASH_REMATCH[3]}"
            else
              major=0; minor=0; patch=0
            fi

            if [[ "$msg" =~ \#major ]]; then
              ((major++)); minor=0; patch=0
            elif [[ "$msg" =~ \#minor ]]; then
              ((minor++)); patch=0
            else
              ((patch++))
            fi

            semver="$major.$minor.$patch"
          fi

          # Ensure tags are fetched so we can detect collisions
          git fetch --tags --quiet

          # If the computed tag already exists, increment patch until unique
          while git rev-parse --verify --quiet "refs/tags/v$semver" >/dev/null; do
            if [[ "$semver" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              major="${BASH_REMATCH[1]}"
              minor="${BASH_REMATCH[2]}"
              patch="${BASH_REMATCH[3]}"
            else
              major=0; minor=0; patch=0
            fi
            ((patch++))
            semver="$major.$minor.$patch"
          done

          new="v$semver"
          short="v${semver%.*}"

          echo "new=$new" >> $GITHUB_OUTPUT
          echo "semver=$semver" >> $GITHUB_OUTPUT
          echo "short=$short" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.new }}
          git push origin ${{ steps.version.outputs.new }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/server:latest
            ghcr.io/${{ github.repository_owner }}/server:${{ steps.version.outputs.new }}
            ghcr.io/${{ github.repository_owner }}/server:${{ steps.version.outputs.short }}
            ghcr.io/${{ github.repository_owner }}/server:${{ steps.version.outputs.semver }}
