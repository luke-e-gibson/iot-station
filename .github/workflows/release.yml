---
name: Release Pipeline
run-name: Release ${{ github.ref }}

defaults:
  run:
    shell: bash

permissions:
  contents: write
  packages: write

on:
  push:
    branches:
      - master
    paths:
      - "server/**"
      - "dashboard/**"

jobs:
  CheckTriggers:
    if: ${{ contains(github.event.head_commit.message, '#release') }}
    runs-on: ubuntu-latest
    outputs:
      has_server_changes: ${{ steps.check_changes.outputs.has_server_changes }}
      has_dashboard_changes: ${{ steps.check_changes.outputs.has_dashboard_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          ref: ${{ github.sha }}

      - name: Detect changed files in last commit only
        id: check_changes
        run: |
          if git diff --name-only HEAD~1..HEAD > /tmp/changed 2>/dev/null; then
            if grep -qiE '^server/' /tmp/changed; then
              echo "has_server_changes=true" >> $GITHUB_OUTPUT
              echo "Detected changes in server/ directory."
            else
              echo "has_server_changes=false" >> $GITHUB_OUTPUT
              echo "No changes detected in server/ directory."
            fi
            if grep -qiE '^dashboard/' /tmp/changed; then
              echo "has_dashboard_changes=true" >> $GITHUB_OUTPUT
              echo "Detected changes in dashboard/ directory."
            else
              echo "has_dashboard_changes=false" >> $GITHUB_OUTPUT
              echo "No changes detected in dashboard/ directory."
            fi
          else
            echo "has_server_changes=false" >> $GITHUB_OUTPUT
            echo "Failed to compute changed files; assuming no server changes."
            echo "has_dashboard_changes=false" >> $GITHUB_OUTPUT
            echo "Failed to compute changed files; assuming no dashboard changes."
          fi

  release:
    needs: CheckTriggers
    if: ${{ (needs.CheckTriggers.outputs.has_server_changes == 'true' || needs.CheckTriggers.outputs.has_dashboard_changes == 'true') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine service versions
        id: versioning
        run: |
          set -euo pipefail
          msg="${{ github.event.head_commit.message }}"
          has_server="${{ needs.CheckTriggers.outputs.has_server_changes }}"
          has_dashboard="${{ needs.CheckTriggers.outputs.has_dashboard_changes }}"
          components=()

          add_component() {
            comp="$1"
            dir="./${comp}"
            dockerfile="${dir}/Dockerfile"

            if [[ -d "$dir" && -f "$dockerfile" ]]; then
              components+=("$comp")
            else
              echo "Component ${comp} flagged for release but missing ${dir} or ${dockerfile}; skipping."
            fi
          }

          if [[ "$has_server" == "true" ]]; then
            add_component server
          fi
          if [[ "$has_dashboard" == "true" ]]; then
            add_component dashboard
          fi

          for comp in "${components[@]}"; do
            semver=""

            if [[ "$msg" =~ \#${comp}@v([0-9]+\.[0-9]+\.[0-9]+) ]]; then
              semver="${BASH_REMATCH[1]}"
            else
              latest_tag=$(git tag --list "${comp}@v*" --sort=-v:refname | head -n1)
              latest="${latest_tag#${comp}@v}"

              if [[ "$latest" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
                major="${BASH_REMATCH[1]}"
                minor="${BASH_REMATCH[2]}"
                patch="${BASH_REMATCH[3]}"
              else
                major=0; minor=0; patch=0
              fi

              if [[ "$msg" =~ \#${comp}-major ]]; then
                ((major++)); minor=0; patch=0
              elif [[ "$msg" =~ \#${comp}-minor ]]; then
                ((minor++)); patch=0
              else
                ((patch++))
              fi

              semver="$major.$minor.$patch"
            fi

            while git rev-parse --verify --quiet "refs/tags/${comp}@v$semver" >/dev/null; do
              if [[ "$semver" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
                major="${BASH_REMATCH[1]}"
                minor="${BASH_REMATCH[2]}"
                patch="${BASH_REMATCH[3]}"
              else
                major=0; minor=0; patch=0
              fi
              ((patch++))
              semver="$major.$minor.$patch"
            done

            new_tag="${comp}@v$semver"
            short="v${semver%.*}"

            echo "${comp}_new=${new_tag}" >> $GITHUB_OUTPUT
            echo "${comp}_semver=${semver}" >> $GITHUB_OUTPUT
            echo "${comp}_short=${short}" >> $GITHUB_OUTPUT
            echo "Determined ${comp} version: ${new_tag}"
          done

      - name: Configure git identity for tagging
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create component tags
        run: |
          set -euo pipefail
          if [[ -n "${{ steps.versioning.outputs.server_new }}" ]]; then
            git tag "${{ steps.versioning.outputs.server_new }}"
            git push origin "${{ steps.versioning.outputs.server_new }}"
          else
            echo "Server tagging skipped because versioning emitted no output for that component."
          fi
          if [[ -n "${{ steps.versioning.outputs.dashboard_new }}" ]]; then
            git tag "${{ steps.versioning.outputs.dashboard_new }}"
            git push origin "${{ steps.versioning.outputs.dashboard_new }}"
          else
            echo "Dashboard tagging skipped because versioning emitted no output for that component."
          fi

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        if: ${{ needs.CheckTriggers.outputs.has_server_changes == 'true' && steps.versioning.outputs.server_semver != '' }}
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/server:latest
            ghcr.io/${{ github.repository_owner }}/server:${{ steps.versioning.outputs.server_short }}
            ghcr.io/${{ github.repository_owner }}/server:${{ steps.versioning.outputs.server_semver }}

      - name: Build and push dashboard image
        if: ${{ needs.CheckTriggers.outputs.has_dashboard_changes == 'true' && steps.versioning.outputs.dashboard_semver != '' }}
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/dashboard:latest
            ghcr.io/${{ github.repository_owner }}/dashboard:${{ steps.versioning.outputs.dashboard_short }}
            ghcr.io/${{ github.repository_owner }}/dashboard:${{ steps.versioning.outputs.dashboard_semver }}
