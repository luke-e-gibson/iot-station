name: Continuous Integration
run-name: CI Pipeline

on:
  pull_request:

permissions:
  contents: read

jobs:
  CheckTriggers:
    runs-on: ubuntu-latest
    outputs:
      has_server_flag: ${{ steps.check_msg_for_flags.outputs.has_server }}
      has_client_flag: ${{ steps.check_msg_for_flags.outputs.has_client }}
      has_server_changes: ${{ steps.check_changes.outputs.has_server }}
      has_client_changes: ${{ steps.check_changes.outputs.has_client }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check latest commit message for flags
        id: check_msg_for_flags
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          msg=$(git show -s --format=%B "$PR_HEAD_SHA" || git log -1 --pretty=%B)
          if echo "$msg" | grep -q '#no-docker'; then
            echo "has_server=false" >> $GITHUB_OUTPUT
          else
            echo "has_server=true" >> $GITHUB_OUTPUT
          fi
          if echo "$msg" | grep -q '#no-pio'; then
            echo "has_client=false" >> $GITHUB_OUTPUT
          else
            echo "has_client=true" >> $GITHUB_OUTPUT
          fi

      - name: Detect changed files between PR base and head
        id: check_changes
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          # ensure commits are available
          git fetch --no-tags --prune --depth=0 origin || true
          changed=$(git diff --name-only "$PR_BASE_SHA" "$PR_HEAD_SHA")
          echo "$changed"
          if echo "$changed" | grep -qE '^server/'; then
            echo "has_server=true" >> $GITHUB_OUTPUT
          else
            echo "has_server=false" >> $GITHUB_OUTPUT
          fi
          if echo "$changed" | grep -qE '^client/'; then
            echo "has_client=true" >> $GITHUB_OUTPUT
          else
            echo "has_client=false" >> $GITHUB_OUTPUT
          fi

  BuildDocker:
    needs: CheckTriggers
    if: ${{ needs.CheckTriggers.outputs.has_server_changes && needs.CheckTriggers.outputs.has_server_flag && !contains(github.event.pull_request.title, '#no-docker') && !contains(github.event.pull_request.body, '#no-docker') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up qemu
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false

  PreparePlatformIO:
    needs: CheckTriggers
    if: ${{ needs.CheckTriggers.outputs.has_client_changes && needs.CheckTriggers.outputs.has_client_flag && !contains(github.event.pull_request.title, '#no-pio') && !contains(github.event.pull_request.body, '#no-pio') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    outputs:
      matrix: ${{ steps.pioenvs.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract PlatformIO environments and prime cache
        id: pioenvs
        run: |
          sudo apt-get update -y && sudo apt-get install -y jq
          pip install --upgrade platformio
          envs=$(pio project config --json-output | jq -r '.[] | select(.[0] | startswith("env:")) | .[0] | sub("env:"; "")')
          json=$(printf '%s\n' "$envs" | jq -R . | jq -s . | jq -c .)

          # Prime PlatformIO by installing required platforms (no build)
          for e in $(echo "$json" | jq -r '.[]'); do
            echo "Priming PlatformIO for env: $e"
            platform=$(pio project config --json-output | jq -r --arg env "env:$e" '.[] | select(.[0] == $env) | .[1][] | select(type=="object") | .platform // empty')
            if [ -n "$platform" ]; then
              pio platform install "$platform" || true
            fi
          done

          echo "matrix=$json" >> $GITHUB_OUTPUT

      - name: Cache PlatformIO and pip (prime)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.local
            ~/.platformio/.cache
            ~/.platformio/lib
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/toolchains
            client/.pio/libdeps
          key: ${{ runner.os }}-platformio-prime-${{ hashFiles('client/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-prime-
            ${{ runner.os }}-platformio-

  PlatformIoBuild:
    needs: PreparePlatformIO
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    strategy:
      fail-fast: false
      matrix:
        env: ${{ fromJson(needs.PreparePlatformIO.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache PlatformIO and pip
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.local
            ~/.platformio/.cache
            ~/.platformio/lib
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/toolchains
            client/.pio/libdeps
          key: ${{ runner.os }}-platformio-${{ matrix.env }}-${{ hashFiles('client/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-${{ matrix.env }}-${{ hashFiles('client/platformio.ini') }}
            ${{ runner.os }}-platformio-prime-${{ hashFiles('client/platformio.ini') }}
            ${{ runner.os }}-platformio-${{ matrix.env }}-
            ${{ runner.os }}-platformio-

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Install intelhex for ESP32
        if: contains(matrix.env, 'esp32')
        run: pip install intelhex

      - name: Build PlatformIO Project
        run: pio run --environment ${{ matrix.env }}
