name: Continuous Integration
run-name: CI Pipeline

on:
  pull_request:

jobs:
  BuildDocker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up qemu
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false

  PreparePlatformIO:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    outputs:
      matrix: ${{ steps.pioenvs.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract PlatformIO environments
        id: pioenvs
        run: |
          pip install --upgrade platformio jq
          envs=$(pio project config --json-output | jq -r '.env | keys[]')
          json=$(printf '%s\n' "$envs" | jq -R . | jq -s .)
          echo "matrix=$json" >> $GITHUB_OUTPUT

  PlatformIoBuild:
    needs: PreparePlatformIO
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    strategy:
      fail-fast: false
      matrix:
        env: ${{ fromJson(needs.PreparePlatformIO.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Install intelhex for ESP32
        if: contains(matrix.env, 'esp32')
        run: pip install intelhex

      - name: Build PlatformIO Project
        run: pio run --project-dir ./client --environment ${{ matrix.env }}
