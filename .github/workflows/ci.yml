---
name: Continuous Integration
run-name: CI Pipeline

defaults:
  run:
    shell: bash

on:
  pull_request:
    branches:
      - "master"
    paths:
      - "server/**"
      - "dashboard/**"
      - "client/**"

permissions:
  contents: read

jobs:
  CheckTriggers:
    runs-on: ubuntu-latest
    outputs:
      has_no-docker_flag: ${{ steps.check_msg_for_flags.outputs.has_no-docker_flag }}
      has_no-pio_flag: ${{ steps.check_msg_for_flags.outputs.has_no-pio_flag }}
      has_server_changes: ${{ steps.check_changes.outputs.has_server_changes }}
      has_client_changes: ${{ steps.check_changes.outputs.has_client_changes }}
      has_dashboard_changes: ${{ steps.check_changes.outputs.has_dashboard_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Check latest commit message for flags
        id: check_msg_for_flags
        run: |
          if git show -s --format=%B HEAD > /tmp/commit_msg 2>/dev/null; then
            if grep -qi '#no-docker' /tmp/commit_msg; then
              echo "has_no-docker_flag=true" >> $GITHUB_OUTPUT
              echo "Found #no-docker flag in commit message."
            else
              echo "has_no-docker_flag=false" >> $GITHUB_OUTPUT
              echo "Did not find #no-docker flag in commit message."
            fi
            if grep -qi '#no-pio' /tmp/commit_msg; then
              echo "has_no-pio_flag=true" >> $GITHUB_OUTPUT
              echo "Found #no-pio flag in commit message."
            else
              echo "has_no-pio_flag=false" >> $GITHUB_OUTPUT
              echo "Did not find #no-pio flag in commit message."
            fi
          else
            echo "has_no-docker_flag=true" >> $GITHUB_OUTPUT
            echo "Failed to read commit message; assuming #no-docker flag in message."
            echo "has_no-pio_flag=true" >> $GITHUB_OUTPUT
            echo "Failed to read commit message; assuming #no-pio flag in message."
          fi

      - name: Detect changed files in last commit only
        id: check_changes
        run: |
          if git diff --name-only HEAD~1..HEAD > /tmp/changed 2>/dev/null; then
            if grep -qiE '^server/' /tmp/changed; then
              echo "has_server_changes=true" >> $GITHUB_OUTPUT
              echo "Detected changes in server/ directory."
            else
              echo "has_server_changes=false" >> $GITHUB_OUTPUT
              echo "No changes detected in server/ directory."
            fi
            if grep -qiE '^dashboard/' /tmp/changed; then
              echo "has_dashboard_changes=true" >> $GITHUB_OUTPUT
              echo "Detected changes in dashboard/ directory."
            else
              echo "has_dashboard_changes=false" >> $GITHUB_OUTPUT
              echo "No changes detected in dashboard/ directory."
            fi
            if grep -qiE '^client/' /tmp/changed; then
              echo "has_client_changes=true" >> $GITHUB_OUTPUT
              echo "Detected changes in client/ directory."
            else
              echo "has_client_changes=false" >> $GITHUB_OUTPUT
              echo "No changes detected in client/ directory."
            fi
          else
            echo "has_server_changes=false" >> $GITHUB_OUTPUT
            echo "Failed to compute changed files; assuming no server changes."
            echo "has_dashboard_changes=false" >> $GITHUB_OUTPUT
            echo "Failed to compute changed files; assuming no dashboard changes."
            echo "has_client_changes=false" >> $GITHUB_OUTPUT
            echo "Failed to compute changed files; assuming no client changes."
          fi

  BuildDockerServer:
    needs: CheckTriggers
    if: ${{ needs.CheckTriggers.outputs.has_server_changes == 'true' && needs.CheckTriggers.outputs.has_no-docker_flag == 'false' && !contains(github.event.pull_request.title, '#no-docker') && !contains(github.event.pull_request.body, '#no-docker') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up qemu
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false

  BuildDockerDashboard:
    needs: CheckTriggers
    if: ${{ needs.CheckTriggers.outputs.has_dashboard_changes == 'true' && needs.CheckTriggers.outputs.has_no-docker_flag == 'false' && !contains(github.event.pull_request.title, '#no-docker') && !contains(github.event.pull_request.body, '#no-docker') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up qemu
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false

  PreparePlatformIO:
    needs: CheckTriggers
    if: ${{ needs.CheckTriggers.outputs.has_client_changes == 'true' && needs.CheckTriggers.outputs.has_no-pio_flag == 'false' && !contains(github.event.pull_request.title, '#no-pio') && !contains(github.event.pull_request.body, '#no-pio') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    outputs:
      matrix: ${{ steps.pioenvs.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract PlatformIO environments and prime cache
        id: pioenvs
        run: |
          sudo apt-get update -y && sudo apt-get install -y jq
          pip install --upgrade platformio
          envs=$(pio project config --json-output | jq -r '.[] | select(.[0] | startswith("env:")) | .[0] | sub("env:"; "")')
          json=$(printf '%s\n' "$envs" | jq -R . | jq -s . | jq -c .)

          # Prime PlatformIO by installing required platforms (no build)
          for e in $(echo "$json" | jq -r '.[]'); do
            echo "Priming PlatformIO for env: $e"
            platform=$(pio project config --json-output | jq -r --arg env "env:$e" '.[] | select(.[0] == $env) | .[1][] | select(type=="object") | .platform // empty')
            if [ -n "$platform" ]; then
              pio platform install "$platform" || true
            fi
          done

          echo "matrix=$json" >> $GITHUB_OUTPUT

      - name: Cache PlatformIO and pip (prime)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.local
            ~/.platformio/.cache
            ~/.platformio/lib
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/toolchains
            client/.pio/libdeps
          key: ${{ runner.os }}-platformio-prime-${{ hashFiles('client/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-prime-
            ${{ runner.os }}-platformio-

  PlatformIoBuild:
    needs: PreparePlatformIO
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    strategy:
      fail-fast: false
      matrix:
        env: ${{ fromJson(needs.PreparePlatformIO.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache PlatformIO and pip
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.local
            ~/.platformio/.cache
            ~/.platformio/lib
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/toolchains
            client/.pio/libdeps
          key: ${{ runner.os }}-platformio-${{ matrix.env }}-${{ hashFiles('client/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-${{ matrix.env }}-${{ hashFiles('client/platformio.ini') }}
            ${{ runner.os }}-platformio-prime-${{ hashFiles('client/platformio.ini') }}
            ${{ runner.os }}-platformio-${{ matrix.env }}-
            ${{ runner.os }}-platformio-

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Install intelhex for ESP32
        if: contains(matrix.env, 'esp32')
        run: pip install intelhex

      - name: Build PlatformIO Project
        run: pio run --environment ${{ matrix.env }}
